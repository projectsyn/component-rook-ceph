apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: syn-rook-ceph
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: ceph-csi
    app.kubernetes.io/version: v1.0.4
    helm.sh/chart: ceph-csi-operator-1.0.4
  name: ceph-csi-operatorconfig-viewer-role
rules:
  - apiGroups:
      - csi.ceph.io
    resources:
      - operatorconfigs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - csi.ceph.io
    resources:
      - operatorconfigs/status
    verbs:
      - get
